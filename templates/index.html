<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Memo App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="container">
      <section class="form-card">
        <form action="/" method="post">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" placeholder="Memo title" />

          <label for="content">Content</label>
          <textarea id="content" name="content" placeholder="Write your memo..."></textarea>

          <button type="submit" class="btn btn-primary">Submit</button>
        </form>
      </section>

      <h2 class="section-title">Memos</h2>
      <div class="memo-list">
        {% for memo in memos %}
        <article class="memo-card">
          <h3>{{ memo.title }}</h3>
          <p class="memo-content">{{ memo.content }}</p>
          <p class="memo-time">
            {% if memo.updated_at and memo.updated_at != memo.created_at %}
              <span class="memo-updated-at">마지막 수정: {{ memo.updated_at.strftime('%Y-%m-%d %H:%M:%S') }}</span>
            {% else %}
              <span class="memo-created-at">작성: {{ memo.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</span>
            {% endif %}
          </p>
          <div class="memo-actions">
            <a href="{{ url_for('edit', id=memo.id) }}" class="btn btn-edit">Edit</a>
            <a href="{{ url_for('delete', id=memo.id) }}" class="btn btn-delete">Delete</a>
          </div>
        </article>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
