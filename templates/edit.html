<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Edit Memo</title>
    <style>
      html { font-size: 16px; }
      body { font-size: 16px; }
      label, input, textarea, button, a { font-size: 16px; }
    </style>
  </head>
  <body>
    <h2>Edit Memo</h2>
    <form action="{{ url_for('edit', id=memo.id) }}" method="post">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" value="{{ memo.title }}" />

      <label for="content">Content</label>
      <textarea id="content" name="content">{{ memo.content }}</textarea>

      <button type="submit">Update</button>
    </form>
    <a href="{{ url_for('index') }}">Back to list</a>
  </body>
</html>
