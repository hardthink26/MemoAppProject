<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit Memo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="container">
      <section class="form-card">
        <h2 class="page-title">Edit Memo</h2>
        <form action="{{ url_for('edit', id=memo.id) }}" method="post">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" value="{{ memo.title }}" />
          <label for="content">Content</label>
          <textarea id="content" name="content">{{ memo.content }}</textarea>

          <button type="submit" class="btn btn-primary">Update</button>
        </form>
        <a href="{{ url_for('index') }}" class="btn btn-back">← Back to list</a>
      </section>
    </div>
  </body>
</html>
